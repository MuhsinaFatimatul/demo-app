name: Github Runners Example

on:
  push:
    branches:
    - main



jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
    - name: Creating a Folder
      run: |
            echo "${{secrets.SSH_KEY}}" >> key.pem
            chmod 400 key.pem
            ssh -o StrictHostKeyChecking=no -i "key.pem" ${{secrets.SSH_USER}}@${{secrets.SSH_HOST}}
            mkdir fatima-folder
            pwd
           
      








